[advisories]
# paste is unmaintained (RUSTSEC-2024-0436) but it's a transitive dep
# from utoipa-axum — no action we can take until upstream migrates.
ignore = ["RUSTSEC-2024-0436"]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8
unused-allowed-license = "allow"
