name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ── Stage 1: quality gate ──────────────────────────────────────────
  quality:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: 0
      RUSTFLAGS: "-D warnings"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88.0"
          components: rustfmt,clippy

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: multilinguarr
          cache-on-failure: true

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny@0.18

      - name: Advisory + license audit
        run: cargo deny check advisories licenses

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --features e2e -- -D warnings

      - name: Unit tests
        run: cargo test --locked

  # ── Stage 2: e2e tests ────────────────────────────────────────────
  e2e:
    name: e2e tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: 0
      RUSTFLAGS: "-D warnings"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88.0"

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: multilinguarr-e2e
          cache-on-failure: true

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Cache test fixtures
        id: cache-fixtures
        uses: actions/cache@v4
        with:
          path: tests/media
          key: fixtures-${{ hashFiles('scripts/generate-fixtures.sh') }}

      - name: Generate test fixtures
        if: steps.cache-fixtures.outputs.cache-hit != 'true'
        run: |
          mkdir -p tests/media
          cd tests/media

          # 6-minute synthetic source (video + audio) — no external download
          # Duration clears Radarr's 5-min sample threshold
          ffmpeg -f lavfi -i testsrc2=duration=360:size=320x240:rate=24 \
            -f lavfi -i sine=frequency=440:duration=360 \
            -c:v libx264 -preset ultrafast -crf 51 \
            -c:a aac -b:a 32k \
            source.mkv -y -loglevel error

          # Multi-language: 3 audio tracks (eng/fre/spa)
          ffmpeg -i source.mkv \
            -filter_complex "[0:a]asplit=3[a1][a2][a3]" \
            -map 0:v -map "[a1]" -map "[a2]" -map "[a3]" \
            -c:v copy \
            -c:a aac -b:a 32k \
            -metadata:s:a:0 language=eng -metadata:s:a:0 title="English" \
            -metadata:s:a:1 language=fre -metadata:s:a:1 title="French" \
            -metadata:s:a:2 language=spa -metadata:s:a:2 title="Spanish" \
            test-movie-multi.mkv -y -loglevel error

          # English only
          ffmpeg -i source.mkv \
            -map 0:v -map 0:a \
            -c:v copy -c:a aac -b:a 32k \
            -metadata:s:a:0 language=eng -metadata:s:a:0 title="English" \
            test-movie-en.mkv -y -loglevel error

          # French only
          ffmpeg -i source.mkv \
            -map 0:v -map 0:a \
            -c:v copy -c:a aac -b:a 32k \
            -metadata:s:a:0 language=fre -metadata:s:a:0 title="French" \
            test-movie-fr.mkv -y -loglevel error

          cp test-movie-multi.mkv test-episode-multi.mkv
          cp test-movie-en.mkv test-episode-en.mkv
          cp test-movie-fr.mkv test-episode-fr.mkv

          ls -lh test-*.mkv

      - name: Run E2E tests
        run: cargo test --features e2e --test e2e --locked
        timeout-minutes: 10

      - name: Display container logs on failure
        if: failure()
        run: |
          echo "=== Docker containers ==="
          docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" 2>/dev/null || true
          echo ""
          for container in $(docker ps -a --format "{{.Names}}" 2>/dev/null); do
            echo "=== $container ==="
            docker logs "$container" --tail=50 2>&1 || true
            echo ""
          done

      - name: Save logs on failure
        if: failure()
        run: |
          mkdir -p logs
          for container in $(docker ps -a --format "{{.Names}}" 2>/dev/null); do
            docker logs "$container" > "logs/$container.log" 2>&1 || true
          done

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7

  # ── Stage 3: release (main only) ──────────────────────────────────
  release:
    name: release
    runs-on: ubuntu-latest
    needs: e2e
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      released: ${{ steps.version.outputs.released }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Get tag before release
        id: before
        run: echo "tag=$(git describe --tags --abbrev=0 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"

      - name: Semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: '0'
        run: npx semantic-release

      - name: Get version after release
        id: version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch --tags https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          VERSION=${TAG#v}
          RELEASED=$( [ "$TAG" != "${{ steps.before.outputs.tag }}" ] && echo true || echo false )
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "released=${RELEASED}" >> "$GITHUB_OUTPUT"

  # ── Stage 4: docker build (main only, on release) ─────────────────
  docker:
    name: docker (${{ matrix.platform }})
    needs: release
    if: needs.release.outputs.released == 'true'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout release commit
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            VERSION=${{ needs.release.outputs.version }}
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          outputs: type=image,"name=ghcr.io/${{ github.repository }}",push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,scope=${{ matrix.platform }},mode=max

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # ── Stage 5: merge multi-arch manifest ─────────────────────────────
  manifest:
    name: docker manifest
    needs: [release, docker]
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digest-*
          merge-multiple: true

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          VERSION=${{ needs.release.outputs.version }}
          docker buildx imagetools create \
            -t "$IMAGE:$VERSION" \
            -t "$IMAGE:latest" \
            $(printf "$IMAGE@sha256:%s " *)
